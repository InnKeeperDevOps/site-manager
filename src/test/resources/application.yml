spring:
  datasource:
    url: "jdbc:sqlite:file:testdb?mode=memory&cache=shared"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.community.dialect.SQLiteDialect

app:
  workspace-dir: /tmp/workspace-test
  claude-cli-path: echo
  suggestion-timeout-minutes: 60
