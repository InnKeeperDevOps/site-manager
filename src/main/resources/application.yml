spring:
  datasource:
    url: jdbc:sqlite:./data/sitemanager.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

logging:
  level:
    com.sitemanager.service.ClaudeService: INFO
    com.sitemanager.service.SuggestionService: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  workspace-dir: /workspace
  claude-cli-path: claude
  suggestion-timeout-minutes: 1440
  claude-timeout-minutes: 30
  # Model for main operations (evaluate, execute). Empty = CLI default.
  claude-model: ${CLAUDE_MODEL:}
  # Faster/cheaper model for expert reviews and feedback validation. Empty = uses claude-model.
  claude-model-expert: ${CLAUDE_MODEL_EXPERT:}
  # Max turns for expert reviews (limits tool-use loops). Default 3.
  claude-max-turns-expert: ${CLAUDE_MAX_TURNS_EXPERT:3}
  # Max concurrent Claude CLI processes. Prevents resource exhaustion during batch expert reviews.
  claude-max-concurrent: ${CLAUDE_MAX_CONCURRENT:2}
  # Max Claude CLI calls per minute (sliding window). Prevents runaway loops from overwhelming the API.
  claude-max-calls-per-minute: ${CLAUDE_MAX_CALLS_PER_MINUTE:10}
  git-ssh-key-path: ${GIT_SSH_KEY_PATH:}
  # Enable verbose CLI logging: logs full command, real-time stdout, and response at INFO level.
  # Also passes --verbose to the Claude CLI subprocess for turn-by-turn output.
  claude-verbose: ${CLAUDE_VERBOSE:false}
  # When running as root, run Claude CLI and git subprocesses as this user instead.
  # The user must exist in the container. Leave empty to disable (run as current user).
  claude-run-as-user: ${CLAUDE_RUN_AS_USER:}
