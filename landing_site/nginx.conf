user claude;
worker_processes 1;
pid /home/claude/site-manager/landing_site/nginx-tmp/run/nginx.pid;
error_log /home/claude/site-manager/landing_site/nginx-tmp/logs/error.log warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /home/claude/site-manager/landing_site/nginx-tmp/client_body;
    proxy_temp_path /home/claude/site-manager/landing_site/nginx-tmp/proxy;
    fastcgi_temp_path /home/claude/site-manager/landing_site/nginx-tmp/fastcgi;
    uwsgi_temp_path /home/claude/site-manager/landing_site/nginx-tmp/uwsgi;
    scgi_temp_path /home/claude/site-manager/landing_site/nginx-tmp/scgi;

    access_log /home/claude/site-manager/landing_site/nginx-tmp/logs/access.log;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8888;
        server_name localhost;

        root /home/claude/site-manager/landing_site;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # Don't serve the nginx config or temp files
        location ~* ^/(nginx\.conf|nginx-tmp/) {
            deny all;
        }
    }

    # Live Claude stream at suggest.aibe.app
    server {
        listen 8888;
        server_name suggest.aibe.app;

        location / {
            proxy_pass http://127.0.0.1:5555;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /stream {
            proxy_pass http://127.0.0.1:5555/stream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
        }
    }
}
